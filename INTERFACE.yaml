# Module Input-Output structure for automated docs generation
convention_version: v1.0.0

pathvars:
  snakemake_defaults:
    logs:
      default: "<logs>"
      description: location of snakemake log files.
    resources:
      default: "<resources>"
      description: "location of module resource (input) files."
    results:
      default: "<results>"
      description: "location of module result (output) files."
  results:
    shapes:
      default: "<results>/{scenario}/shapes.parquet"
      description: |
        Harmonised geoparquet dataset for a configured scenario, including land and maritime non-contested EEZs.
wildcards:
  scenario: Scenario name from the module configuration.
