# Module Input-Output structure for automated doc. generation
pathvars:
  snakemake_defaults:
    logs:
      default: "<logs>"
      description: location of rule log files.
    resources:
      default: "<resources>"
      description: "location of module resource files."
    results:
      default: "<results>"
      description: "location of module results."
  results:
    shapes:
      default: "<results>/{scenario}/shapes.parquet"
      description: |
        Harmonised geoparquet dataset for a configured scenario, including land and maritime non-contested EEZs.
wildcards:
  scenario: Scenario name from the module configuration.
