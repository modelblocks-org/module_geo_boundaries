# Module settings that users cannot modify.
voronoi_eez: # defaults for Voronoi EEZ splitting
  enabled: false
  sample_spacing: 10000
  min_samples_per_shoreline: 8
  max_samples_per_maritime: 50000
  include_shoreline_vertices: true
  shoreline_search_radius: 10000
  uncovered_area_tolerance: 1
timeouts:
  max_retries: 3
  connect_seconds: 15
  read_seconds: 30
  initial_retry_seconds: 5
overture_release: "latest"
